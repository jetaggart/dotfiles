gui:
  showIcons: true
  nerdFontsVersion: "3"
  scrollHeight: 10
  scrollPastBottom: true
  mouseEvents: true
  border: rounded
  theme:
    lightTheme: true
    activeBorderColor:
      - "#1e66f5"
      - bold
    inactiveBorderColor:
      - "#8c8fa1"
    optionsTextColor:
      - "#1e66f5"
    selectedLineBgColor:
      - "#dce0e8"
    selectedRangeBgColor:
      - "#dce0e8"
    cherryPickedCommitBgColor:
      - "#7287fd"
    cherryPickedCommitFgColor:
      - "#eff1f5"
    markedBaseCommitBgColor:
      - "#df8e1d"
    markedBaseCommitFgColor:
      - "#eff1f5"
    unstagedChangesColor:
      - "#d20f39"
    defaultFgColor:
      - "#4c4f69"
git:
  pagers:
    - colorArg: always
      pager: delta --light --paging=never
  commit:
    signOff: false
  merging:
    args: ""
  log:
    showGraph: always
  truncateCopiedCommitHashesTo: 12
os:
  editPreset: "nvim-remote"
  copyToClipboardCmd: pbcopy
  open: open {{filename}}
  openLink: open {{link}}
refresher:
  refreshInterval: 10
  fetchInterval: 60
update:
  method: never
confirmOnQuit: false
quitOnTopLevelReturn: true
